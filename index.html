<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لعبة الشهر واليوم</title>
  <meta name="description" content="موقع بسيط واحترافي يطلب منك اختيار الشهر واليوم ثم يعرض سؤال داخل كرت أنيق." />
  <style>
    :root {
      --bg0: #f8fafc;
      --bg1: #e2e8f0;
      --text: #0f172a;
      --muted: #64748b;
      --line: #e2e8f0;
      --card: rgba(255,255,255,.72);
      --dark: #0f172a;
      --dark2: #1e293b;
      --shadow: 0 28px 80px rgba(15,23,42,.12);
      --radius-xl: 30px;
      --radius-lg: 20px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      font-family: Tahoma, Arial, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top, #ffffff 0%, var(--bg0) 40%, var(--bg1) 100%);
    }

    .page {
      width: min(1180px, calc(100% - 24px));
      margin: 0 auto;
      padding: 24px 0 34px;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.05fr .95fr;
      gap: 22px;
      align-items: stretch;
    }

    .panel {
      background: var(--card);
      border: 1px solid rgba(255,255,255,.7);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      overflow: hidden;
    }

    .panel-inner { padding: 28px; }

    .brand {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 18px;
    }

    .brand-badge {
      width: 58px;
      height: 58px;
      border-radius: 20px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--dark), #475569);
      color: #fff;
      box-shadow: 0 16px 28px rgba(15,23,42,.18);
      flex: none;
      font-size: 24px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1.15;
      letter-spacing: -.3px;
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.9;
      font-size: 15px;
      max-width: 62ch;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 22px;
    }

    .field { display: flex; flex-direction: column; gap: 8px; }
    .field label { font-size: 14px; font-weight: 700; color: #334155; }

    select {
      width: 100%;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.94);
      color: var(--text);
      border-radius: 18px;
      padding: 14px 16px;
      outline: none;
      transition: .2s ease;
      font: inherit;
    }
    select:focus {
      border-color: #94a3b8;
      box-shadow: 0 0 0 4px rgba(148,163,184,.18);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 22px;
    }

    .btn {
      border: 0;
      border-radius: 16px;
      padding: 13px 18px;
      cursor: pointer;
      font-weight: 700;
      transition: .2s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      min-width: 160px;
      font: inherit;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .btn-primary {
      color: #fff;
      background: linear-gradient(135deg, var(--dark), var(--dark2));
      box-shadow: 0 14px 28px rgba(15,23,42,.2);
    }

    .btn-secondary {
      color: var(--text);
      background: rgba(255,255,255,.92);
      border: 1px solid var(--line);
    }

    .hint {
      margin-top: 18px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.8;
      background: rgba(255,255,255,.55);
      border: 1px dashed rgba(100,116,139,.25);
      border-radius: 18px;
      padding: 14px 16px;
    }

    .card-area {
      min-height: 100%;
      padding: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .empty-state {
      width: 100%;
      min-height: 500px;
      border-radius: 34px;
      border: 1px dashed rgba(100,116,139,.34);
      background: rgba(255,255,255,.54);
      display: grid;
      place-items: center;
      text-align: center;
      color: #475569;
      padding: 30px;
    }
    .empty-state strong { display: block; font-size: 22px; color: var(--text); margin-bottom: 10px; }

    .result-card {
      width: 100%;
      min-height: 500px;
      background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
      color: #fff;
      border-radius: 34px;
      padding: 24px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 22px 60px rgba(15,23,42,.28);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      animation: pop .35s ease;
    }

    .result-card::before,
    .result-card::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,.08);
      pointer-events: none;
    }
    .result-card::before { inset: -70px auto auto -70px; width: 210px; height: 210px; }
    .result-card::after { inset: auto -60px -60px auto; width: 220px; height: 220px; }

    @keyframes pop {
      from { opacity: 0; transform: translateY(10px) scale(.985); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
      position: relative;
      z-index: 1;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.12);
      font-size: 13px;
      color: #e2e8f0;
    }

    .question-title {
      margin: 0;
      font-size: clamp(24px, 3.2vw, 38px);
      line-height: 1.6;
      font-weight: 800;
      position: relative;
      z-index: 1;
    }

    .question-text {
      margin: 16px 0 0;
      font-size: 18px;
      line-height: 1.95;
      color: #e2e8f0;
      min-height: 110px;
      position: relative;
      z-index: 1;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 20px;
      position: relative;
      z-index: 1;
    }

    .meta-box {
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 18px;
      padding: 14px;
      text-align: center;
    }
    .meta-box .label { color: #94a3b8; font-size: 12px; margin-bottom: 6px; }
    .meta-box .value { font-size: 18px; font-weight: 800; }

    .footer-note {
      margin-top: 18px;
      color: #cbd5e1;
      font-size: 13px;
      line-height: 1.8;
      position: relative;
      z-index: 1;
    }

    .toast {
      position: fixed;
      left: 18px;
      bottom: 18px;
      background: rgba(15,23,42,.96);
      color: #fff;
      padding: 12px 16px;
      border-radius: 14px;
      box-shadow: 0 12px 30px rgba(15,23,42,.24);
      font-size: 14px;
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      transition: .25s ease;
      z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    @media (max-width: 1024px) {
      .hero { grid-template-columns: 1fr; }
      .empty-state, .result-card { min-height: 440px; }
    }

    @media (max-width: 720px) {
      .page { width: min(100% - 14px, 1180px); padding-top: 10px; }
      .panel-inner { padding: 18px; }
      .controls { grid-template-columns: 1fr; }
      .meta-grid { grid-template-columns: 1fr; }
      .btn { min-width: 0; width: 100%; }
      .result-card, .empty-state { border-radius: 26px; }
      .question-text { min-height: auto; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <article class="panel">
        <div class="panel-inner">
          <div class="brand">
            <div class="brand-badge">✦</div>
            <div>
              <h1>سؤال من تاريخك</h1>
              <p class="subtitle">
                اختر الشهر واليوم، ثم سيظهر لك سؤال مناسب داخل كرت أنيق.
                الصفحة بسيطة وسريعة ومناسبة للاستخدام المباشر.
              </p>
            </div>
          </div>

          <div class="controls">
            <div class="field">
              <label for="month">الشهر</label>
              <select id="month" aria-label="اختر الشهر"></select>
            </div>
            <div class="field">
              <label for="day">اليوم</label>
              <select id="day" aria-label="اختر اليوم"></select>
            </div>
          </div>

          <div class="actions">
            <button class="btn btn-primary" id="showBtn">أظهر السؤال</button>
            <button class="btn btn-secondary" id="copyBtn">نسخ السؤال</button>
            <button class="btn btn-secondary" id="resetBtn">إعادة ضبط</button>
          </div>

          <div class="hint">
            الشهور التي لها 30 يومًا تتوقف عند يوم 30، وفبراير يتغير تلقائيًا إلى 29 عند تفعيل السنة الكبيسة.
          </div>
        </div>
      </article>

      <article class="panel card-area">
        <div id="output" class="empty-state">
          <div>
            <strong>سيظهر السؤال هنا</strong>
            <div>اختر الشهر واليوم ثم اضغط <b>أظهر السؤال</b>.</div>
          </div>
        </div>
      </article>
    </section>
  </main>

  <div id="toast" class="toast">تم التنفيذ</div>

  <script>
    const months = [
      { key: 'january', ar: 'يناير', days: 31, theme: 'القرار والقيادة' },
      { key: 'february', ar: 'فبراير', days: 28, theme: 'التعاون وحل الخلاف' },
      { key: 'march', ar: 'مارس', days: 31, theme: 'المبادرة والثقة بالنفس' },
      { key: 'april', ar: 'أبريل', days: 30, theme: 'تحمل المسؤولية' },
      { key: 'may', ar: 'مايو', days: 31, theme: 'التواصل مع الفريق' },
      { key: 'june', ar: 'يونيو', days: 30, theme: 'إدارة الوقت تحت الضغط' },
      { key: 'july', ar: 'يوليو', days: 31, theme: 'المرونة والثبات' },
      { key: 'august', ar: 'أغسطس', days: 31, theme: 'الإبداع وتوليد الأفكار' },
      { key: 'september', ar: 'سبتمبر', days: 30, theme: 'حل المشكلات' },
      { key: 'october', ar: 'أكتوبر', days: 31, theme: 'الأخلاق وبناء الثقة' },
      { key: 'november', ar: 'نوفمبر', days: 30, theme: 'الدعم والتحفيز' },
      { key: 'december', ar: 'ديسمبر', days: 31, theme: 'مراجعة الذات والإنجاز' },
    ];

    const questionTemplates = {
      1: 'ماذا لو واجهت {theme} لأول مرة؟',
      2: 'لو كنت مكاني، هل تبدأ بنفسك أم تطلب رأي الفريق؟',
      3: 'ماذا لو اختلفت الآراء داخل المجموعة؟',
      4: 'لو كنت مكاني، كيف تختار الأولوية؟',
      5: 'ماذا لو ظهر خطأ في آخر لحظة؟',
      6: 'لو كنت مكاني، كيف تهدئ الموقف؟',
      7: 'ماذا لو احتاج شخص في الفريق إلى دعمك؟',
      8: 'لو كنت مكاني، هل تتحدث فورًا أم تنتظر؟',
      9: 'ماذا لو لم يفهم الفريق التعليمات من أول مرة؟',
      10: 'لو كنت مكاني، كيف تقسم الأدوار؟',
      11: 'ماذا لو رفض الآخرون اقتراحك؟',
      12: 'لو كنت مكاني، كيف تقنعهم بدون ضغط؟',
      13: 'ماذا لو كان الوقت قليلًا جدًا؟',
      14: 'لو كنت مكاني، ما أول خطوة ستفعلها؟',
      15: 'ماذا لو أخطأ أحد الزملاء أمام الجميع؟',
      16: 'لو كنت مكاني، هل تصلح الخطأ الآن أم بعد اللقاء؟',
      17: 'ماذا لو شعرت أن المسؤولية أكبر منك؟',
      18: 'لو كنت مكاني، كيف تثبت أنك قادر؟',
      19: 'ماذا لو طلب منك قيادة مجموعة جديدة؟',
      20: 'لو كنت مكاني، كيف تكسب ثقة الفريق؟',
      21: 'ماذا لو حدث خلاف بين اثنين في الفريق؟',
      22: 'لو كنت مكاني، كيف تتصرف كوسيط؟',
      23: 'ماذا لو كانت لديك فكرة مختلفة تمامًا؟',
      24: 'لو كنت مكاني، كيف تعرض الفكرة باحترام؟',
      25: 'ماذا لو تعطل العمل بسبب تأخر شخص؟',
      26: 'لو كنت مكاني، كيف تعيد تنظيم المهمة؟',
      27: 'ماذا لو احتجت أن تتخذ قرارًا سريعًا؟',
      28: 'لو كنت مكاني، هل تختار الحل الآمن أم الجريء؟',
      29: 'ماذا لو نجح الفريق وأنت لم تظهر كثيرًا؟',
      30: 'لو كنت مكاني، كيف توازن بين النجاح والظهور؟',
      31: 'ماذا لو طلبوا منك تقييم نفسك بصدق؟'
    };

    const monthSelect = document.getElementById('month');
    const daySelect = document.getElementById('day');
    const output = document.getElementById('output');
    const toast = document.getElementById('toast');
    const showBtn = document.getElementById('showBtn');
    const copyBtn = document.getElementById('copyBtn');
    const resetBtn = document.getElementById('resetBtn');

    const state = {
      monthKey: 'january',
      day: 1,
      currentQuestion: null
    };

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add('show');
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(() => toast.classList.remove('show'), 1500);
    }

    function getMonthData(key) {
      return months.find(m => m.key === key) || months[0];
    }

    function getDaysInMonth(monthKey) {
      const month = getMonthData(monthKey);
      return month.key === 'february' && document.getElementById('leapYear')?.checked ? 29 : month.days;
    }

    function populateMonths() {
      monthSelect.innerHTML = '';
      months.forEach((m, index) => {
        const option = document.createElement('option');
        option.value = m.key;
        option.textContent = m.ar;
        if (index === 0) option.selected = true;
        monthSelect.appendChild(option);
      });
    }

    function populateDays() {
      const maxDays = getDaysInMonth(state.monthKey);
      const current = Math.min(Math.max(state.day || 1, 1), maxDays);
      daySelect.innerHTML = '';
      for (let i = 1; i <= maxDays; i++) {
        const option = document.createElement('option');
        option.value = i;
        option.textContent = i;
        if (i === current) option.selected = true;
        daySelect.appendChild(option);
      }
      state.day = current;
    }

    function buildQuestion(monthKey, day) {
      const month = getMonthData(monthKey);
      const maxDays = getDaysInMonth(monthKey);
      const safeDay = Math.min(Math.max(Number(day) || 1, 1), maxDays);
      const template = questionTemplates[safeDay] || questionTemplates[31];
      return {
        month,
        day: safeDay,
        text: template.replace('{theme}', month.theme),
        maxDays
      };
    }

    function renderQuestion(monthKey, day) {
      const q = buildQuestion(monthKey, day);
      state.currentQuestion = q;

      output.className = '';
      output.innerHTML = `
        <div class="result-card" aria-live="polite">
          <div class="chip-row">
            <div class="chip">📅 ${q.month.ar}</div>
            <div class="chip"># اليوم ${q.day}</div>
            <div class="chip">✨ ${q.month.theme}</div>
          </div>

          <div>
            <h2 class="question-title">سؤال اليوم</h2>
            <p class="question-text">${q.text}</p>

            <div class="meta-grid">
              <div class="meta-box">
                <div class="label">الشهر</div>
                <div class="value">${q.month.ar}</div>
              </div>
              <div class="meta-box">
                <div class="label">اليوم</div>
                <div class="value">${q.day}</div>
              </div>
              <div class="meta-box">
                <div class="label">الأيام</div>
                <div class="value">${q.maxDays}</div>
              </div>
            </div>
          </div>

          <div class="footer-note">يمكنك استخدامه كمدخل للنقاش أو ك لعبة بسيطة لاكتشاف طريقة التفكير.</div>
        </div>
      `;

      showToast('تم عرض السؤال');
      return q;
    }

    function showCurrentQuestion() {
      state.monthKey = monthSelect.value;
      state.day = Number(daySelect.value || 1);
      return renderQuestion(state.monthKey, state.day);
    }

    async function copyCurrentQuestion() {
      const q = state.currentQuestion || showCurrentQuestion();
      const text = `${q.month.ar} - يوم ${q.day}\n${q.text}`;
      try {
        await navigator.clipboard.writeText(text);
        showToast('تم نسخ السؤال');
      } catch {
        showToast('تعذر النسخ');
      }
    }

    function resetAll() {
      state.monthKey = 'january';
      state.day = 1;
      state.currentQuestion = null;
      monthSelect.value = 'january';
      populateDays();
      daySelect.value = 1;
      output.className = 'empty-state';
      output.innerHTML = `
        <div>
          <strong>سيظهر السؤال هنا</strong>
          <div>اختر الشهر واليوم ثم اضغط <b>أظهر السؤال</b>.</div>
        </div>
      `;
      showToast('تمت إعادة الضبط');
    }

    monthSelect.addEventListener('change', () => {
      state.monthKey = monthSelect.value;
      state.day = 1;
      populateDays();
    });

    daySelect.addEventListener('change', () => {
      state.day = Number(daySelect.value || 1);
    });

    showBtn.addEventListener('click', showCurrentQuestion);
    copyBtn.addEventListener('click', copyCurrentQuestion);
    resetBtn.addEventListener('click', resetAll);

    function init() {
      populateMonths();
      populateDays();
    }

    init();
  </script>
</body>
</html>
